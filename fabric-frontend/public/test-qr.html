<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VeriChain QR test</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
  <h1>QR test page</h1>
  <p>Paste a verification URL from the View QR page (encoded using API <code>FRONTEND_URL</code>):</p>
  <input id="urlInput" type="url" style="width: min(100%, 32rem)" placeholder="http://…/verify/PRODUCT_ID?batch=…&hash=…" />
  <button type="button" id="renderBtn">Render QR</button>
  <p id="qrUrl"></p>
  <canvas id="qrCanvas"></canvas>
  <script>
    document.getElementById('renderBtn').addEventListener('click', () => {
      const qrUrl = document.getElementById('urlInput').value.trim();
      if (!qrUrl) return;
      document.getElementById('qrUrl').textContent = qrUrl;
      QRCode.toCanvas(document.getElementById('qrCanvas'), qrUrl, { width: 256 });
    });
  </script>
</body>
</html>
